# /usr/lib/tmpfiles.d/tessera.conf
# Runtime directories for Tessera. Created at boot and on every
# `systemd-tmpfiles --create`. Owned by the dedicated `tessera`
# system user (created by debian/postinst); pam_tessera.so reads the
# IPC socket as root via PAM-caller context, owner+group both
# tessera keep the daemon's writes confined.
d /run/tessera          0750 tessera tessera -

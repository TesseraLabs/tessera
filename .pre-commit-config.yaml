# pre-commit hooks for tessera.
#
# Install:
#   pip install pre-commit
#   pre-commit install
#
# Run manually:
#   pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: '^crates/tessera_core/tests/fixtures/'
      - id: end-of-file-fixer
        exclude: '^crates/tessera_core/tests/fixtures/'
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=200']

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all -- --check
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --workspace --all-targets -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-test
        name: cargo test
        entry: cargo test --workspace
        language: system
        types: [rust]
        pass_filenames: false
        stages: [pre-push]

      - id: cargo-deny
        name: cargo deny check
        entry: cargo deny check
        language: system
        types: [rust]
        pass_filenames: false
        stages: [pre-push]

      - id: bash-syntax
        name: bash -n on shell scripts
        entry: bash -n
        language: system
        types: [shell]

      - id: cargo-deb-version-match
        name: Cargo workspace version matches debian/changelog
        language: system
        entry: bash -c '
          set -euo pipefail;
          cargo_ver=$(grep -E "^version\s*=" Cargo.toml | head -1 | sed -E "s/.*\"([^\"]+)\".*/\1/");
          deb_ver=$(head -1 debian/changelog | sed -E "s/^[^(]+\(([^-]+).*/\1/");
          if [ "${cargo_ver}" != "${deb_ver}" ]; then
              echo "ERROR: Cargo.toml version (${cargo_ver}) != debian/changelog (${deb_ver}). Bump debian/changelog." >&2;
              exit 1;
          fi'
        pass_filenames: false
        files: '^(Cargo\.toml|debian/changelog)$'

      - id: no-max-integrity-placeholder
        name: Forbid MAX_INTEGRITY OID placeholders in fixtures, code and docs
        language: system
        entry: bash -c 'if git grep -InE "<MAX_OID>|<TBD-uuid>|2\.25\.<" -- "*.md" "*.rs" "*.cnf" "*.cnf.in" ":(exclude)crates/tessera_core/src/x509/oids.rs" ":(exclude)crates/tessera_core/src/x509/der.rs" ":(exclude)crates/tessera_core/src/x509/der_helpers.rs" ":(exclude)docs/cert-issuance.md" ":(exclude)docs/x509-extensions.md" ":(exclude)docs/superpowers/specs/2026-05-14-mac-integrity-design.md" ":(exclude)docs/superpowers/plans/2026-05-14-mac-integrity.md"; then echo "ERROR: MAX_INTEGRITY OID placeholders found in tracked files" >&2; exit 1; fi'
        pass_filenames: false

[graph]
all-features = true

[advisories]
yanked = "deny"
unmaintained = "workspace"
ignore = [
    # RUSTSEC-2023-0071 (Marvin Attack, CVE-2023-49092) — timing sidechannel in
    # the `rsa` crate. Two independent reasons it does not apply to our use:
    #   1. We call `rsa` only to VERIFY a CSR self-signature (public-key op,
    #      no private key present); the sidechannel is in PRIVATE-key operations.
    #   2. The advisory's own workaround: local use on a non-compromised machine
    #      is fine — CSR verification runs locally in the issuer CLI/agent or in
    #      the trusted internal zone, never exposed to a network timing observer.
    # No fixed release exists (mitigation tracked upstream in RustCrypto/RSA #390);
    # revisit when a patched version ships.
    "RUSTSEC-2023-0071",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = []

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "CC0-1.0",
    "GPL-2.0-only",
    "GPL-2.0-or-later",
    "GPL-3.0-only",
    "GPL-3.0-or-later",
    "LGPL-2.1-only",
    "LGPL-2.1-or-later",
    "LGPL-3.0-only",
    "LGPL-3.0-or-later",
    "AGPL-3.0-only",
    "AGPL-3.0-or-later",
]
confidence-threshold = 0.8

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

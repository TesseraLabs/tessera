name: build-builder-image

on:
  push:
    branches: [main, 'feat/**']
    paths:
      - 'docker/astra-builder.Dockerfile'
      - '.github/workflows/build-builder-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/astra-builder.Dockerfile
          push: true
          tags: |
            ghcr.io/tesseralabs/tessera-astra-builder:latest
            ghcr.io/tesseralabs/tessera-astra-builder:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

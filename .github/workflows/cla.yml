name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: read
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    # Run on PR events, and on comments that look like a signature or recheck.
    # The action itself validates the signature text; `contains` keeps noise out.
    if: >
      github.event_name == 'pull_request_target' ||
      (github.event_name == 'issue_comment' &&
        (contains(github.event.comment.body, 'I have read the CLA Document and I hereby sign the CLA') ||
         github.event.comment.body == 'recheck'))
    steps:
      - name: CLA Assistant Lite
        # Pinned to a full commit SHA (not the mutable @v2.6.1 tag): this workflow
        # runs on pull_request_target with a PAT, so a moved/compromised tag must
        # not be able to swap the action under us.
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_SIGNATURES_PAT }}
        with:
          path-to-signatures: 'signatures/version-1/cla.json'
          path-to-document: 'https://github.com/TesseraLabs/tessera/blob/main/docs/cla/CLA-individual.md'
          branch: 'main'
          remote-organization-name: 'TesseraLabs'
          remote-repository-name: 'cla-signatures'
          allowlist: 'RoboNET,TesseraLabs,dependabot[bot],*[bot]'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-notsigned-prcomment: >
            Thank you for your contribution! Before we can merge it, you need
            to sign our [Contributor License Agreement](https://github.com/TesseraLabs/tessera/blob/main/docs/cla/CLA-individual.md).
            Please post the following comment, adding your **full name** on the
            second line:<br/><br/>`I have read the CLA Document and I hereby sign the CLA`<br/>`Full name: <your full legal name>`
          custom-allsigned-prcomment: 'All contributors have signed the CLA ✍️'
          lock-pullrequest-aftermerge: false

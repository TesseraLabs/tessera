name: Notify docs site

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'

permissions: {}

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger docs site rebuild
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.DOCS_SITE_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/RoboNET/tessera-website/dispatches \
            -d '{"event_type":"docs-updated"}'

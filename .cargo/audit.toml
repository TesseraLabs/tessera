# cargo-audit configuration.
#
# RUSTSEC-2023-0071 (Marvin Attack, CVE-2023-49092) — timing sidechannel in the
# `rsa` crate. Ignored for the same reasons documented in deny.toml:
#   1. We use `rsa` only to VERIFY a CSR self-signature (public-key operation,
#      no private key involved); the sidechannel affects PRIVATE-key operations.
#   2. Per the advisory's own workaround, local use on a non-compromised machine
#      is fine — CSR verification runs locally (issuer CLI/agent) or in the
#      trusted internal zone, never exposed to a network timing observer.
# No fixed release exists yet (RustCrypto/RSA #390); revisit when one ships.
[advisories]
ignore = ["RUSTSEC-2023-0071"]
